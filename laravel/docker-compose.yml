services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: 1000ad
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      # Persist the SQLite database outside the container
      - game-data:/var/www/html/database
      # Persist session files
      - game-sessions:/var/www/html/storage/framework/sessions
    environment:
      - APP_NAME=1000 A.D.
      - APP_ENV=production
      - APP_DEBUG=false
      - APP_KEY=${APP_KEY}
      - APP_URL=${APP_URL:-http://localhost:8080}
      - DB_CONNECTION=sqlite
      - SESSION_DRIVER=file
      - SESSION_LIFETIME=120
      - LOG_CHANNEL=stderr
      - STRIPE_KEY=${STRIPE_KEY:-}
      - STRIPE_SECRET=${STRIPE_SECRET:-}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET:-}
      - STRIPE_EMPIRE_SLOT_PRICE_ID=${STRIPE_EMPIRE_SLOT_PRICE_ID:-}
    restart: unless-stopped

  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: 1000ad-tunnel
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${TUNNEL_TOKEN}
    depends_on:
      - app

volumes:
  game-data:
  game-sessions:
